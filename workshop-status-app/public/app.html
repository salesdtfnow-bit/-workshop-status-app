<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Workshop Status</title>
  <style>
    body { margin: 0; padding: 24px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f6f6f7; color: #202223; }
    .wrap { max-width: 1100px; margin: 0 auto; }
    h1 { font-size: 24px; font-weight: 600; margin: 0 0 4px; }
    .sub { color: #6d7175; margin: 0 0 24px; font-size: 14px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 16px; }
    .card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 1px 0 rgba(0,0,0,0.05), 0 1px 3px rgba(0,0,0,0.06); border: 1px solid #e1e3e5; }
    .card.overall { grid-column: 1 / -1; }
    .card h2 { font-size: 16px; font-weight: 600; margin: 0 0 4px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .meta { font-size: 12px; color: #6d7175; margin: 0 0 14px; }
    .btnrow { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .btn { padding: 10px 8px; border-radius: 8px; border: 1px solid #c9cccf; background: #fff; font-size: 13px; font-weight: 500; cursor: pointer; transition: all .15s ease; color: #202223; font-family: inherit; }
    .btn:hover { border-color: #8a8a8a; }
    .btn.active { color: #fff; border-color: transparent; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
    .btn.active.s-not_busy     { background: #15803d; }
    .btn.active.s-moderate     { background: #a16207; }
    .btn.active.s-busy         { background: #c2410c; }
    .btn.active.s-full_capacity { background: #b91c1c; }
    .btn.s-not_busy:hover      { background: #dcfce7; border-color: #15803d; color: #15803d; }
    .btn.s-moderate:hover      { background: #fef9c3; border-color: #a16207; color: #a16207; }
    .btn.s-busy:hover          { background: #ffedd5; border-color: #c2410c; color: #c2410c; }
    .btn.s-full_capacity:hover { background: #fee2e2; border-color: #b91c1c; color: #b91c1c; }
    .btn:disabled { opacity: .5; cursor: wait; }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #202223; color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 14px; opacity: 0; pointer-events: none; transition: opacity .2s ease; z-index: 1000; }
    .toast.show { opacity: 1; }
    .toast.error { background: #d72c0d; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #e1e3e5; border-top-color: #6d7175; border-radius: 50%; animation: spin .8s linear infinite; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading { text-align: center; padding: 60px 20px; color: #6d7175; }
    .pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
    .pill .dot { width: 6px; height: 6px; border-radius: 50%; }
    .pill.s-not_busy { background: #dcfce7; color: #15803d; }
    .pill.s-not_busy .dot { background: #22c55e; }
    .pill.s-moderate { background: #fef9c3; color: #a16207; }
    .pill.s-moderate .dot { background: #eab308; }
    .pill.s-busy { background: #ffedd5; color: #c2410c; }
    .pill.s-busy .dot { background: #f97316; }
    .pill.s-full_capacity { background: #fee2e2; color: #b91c1c; }
    .pill.s-full_capacity .dot { background: #ef4444; }
    .pill.s-unknown { background: #f0f0f0; color: #6d7175; }
    .pill.s-unknown .dot { background: #9ca3af; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Workshop Status</h1>
    <p class="sub">Tap a status for each department. Changes are written to Shopify metafields immediately and reflected on the storefront.</p>
    <div id="content" class="loading"><span class="spinner"></span> Loading current statuses…</div>
  </div>
  <div id="toast" class="toast"></div>

  <script>
    const ADMIN_PASS = '{{ADMIN_PASS}}';

    const DEPARTMENTS = [
      { key: 'overall',         label: 'Overall workshop', desc: 'High-level summary shown to customers',        overall: true },
      { key: 'dtf',             label: 'DTF production',           desc: 'Direct-to-film transfer queue' },
      { key: 'uv_dtf',          label: 'UV-DTF production',        desc: 'UV-DTF transfer queue' },
      { key: 'vinyl_stickers',  label: 'Vinyl stickers',           desc: 'Vinyl sticker print and finish queue' },
      { key: 'sublimation',     label: 'Sublimation',              desc: 'Sublimation production queue' },
      { key: 'artwork_setup',   label: 'Artwork setup',            desc: 'Artwork checks, file prep, setup queue' },
    ];
    const STATUSES = [
      { key: 'not_busy',      label: 'Not Busy' },
      { key: 'moderate',      label: 'Moderate' },
      { key: 'busy',          label: 'Busy' },
      { key: 'full_capacity', label: 'Full Capacity' },
    ];

    function authHeaders(extra = {}) {
      return Object.assign({ 'X-Admin-Pass': ADMIN_PASS }, extra);
    }

    function fmtTime(iso) {
      if (!iso) return '—';
      try {
        const d = new Date(iso);
        const day = String(d.getDate()).padStart(2, '0');
        const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        const mon = months[d.getMonth()];
        const yr = d.getFullYear();
        const hh = String(d.getHours()).padStart(2, '0');
        const mm = String(d.getMinutes()).padStart(2, '0');
        return `${day} ${mon} ${yr}, ${hh}:${mm}`;
      } catch { return iso; }
    }

    function statusLabel(key) {
      const s = STATUSES.find(s => s.key === key);
      return s ? s.label : 'Unknown';
    }

    function toast(msg, isError = false) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.toggle('error', isError);
      el.classList.add('show');
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
    }

    async function loadStatuses() {
      try {
        const r = await fetch('/api/statuses', { headers: authHeaders() });
        const text = await r.text();
        let body;
        try { body = JSON.parse(text); } catch { body = { error: text }; }
        if (!r.ok) {
          throw new Error(`${r.status} — ${body.error || 'unknown error'}`);
        }
        render(body);
      } catch (e) {
        const el = document.getElementById('content');
        el.classList.remove('loading');
        el.innerHTML = `<div style="padding:20px;background:#fee2e2;border:1px solid #ef4444;border-radius:8px;color:#7f1d1d;">
          <strong>Could not load statuses</strong><br>
          <code style="font-size:12px;display:block;margin-top:8px;background:#fff;padding:8px;border-radius:4px;">${e.message}</code>
          <p style="font-size:13px;margin:12px 0 0;">Check the Vercel deployment logs and confirm your environment variables (<code>SHOPIFY_SHOP_DOMAIN</code>, <code>SHOPIFY_ACCESS_TOKEN</code>, <code>ADMIN_PASS</code>) are set correctly.</p>
        </div>`;
      }
    }

    function render(data) {
      const content = document.getElementById('content');
      content.classList.remove('loading');
      content.innerHTML = '';
      const grid = document.createElement('div');
      grid.className = 'grid';

      DEPARTMENTS.forEach(dept => {
        const current = (data[dept.key]?.value || '').toLowerCase();
        const updatedAt = data[`${dept.key}_updated`]?.value || '';
        const card = document.createElement('div');
        card.className = 'card' + (dept.overall ? ' overall' : '');
        const pillClass = STATUSES.find(s => s.key === current) ? `s-${current}` : 's-unknown';
        card.innerHTML = `
          <h2>
            <span>${dept.label}</span>
            <span class="pill ${pillClass}"><span class="dot"></span>${statusLabel(current)}</span>
          </h2>
          <p class="meta">${dept.desc} · Last updated ${fmtTime(updatedAt)}</p>
          <div class="btnrow" data-dept="${dept.key}">
            ${STATUSES.map(s => `
              <button class="btn s-${s.key}${current === s.key ? ' active' : ''}" data-status="${s.key}">
                ${s.label}
              </button>
            `).join('')}
          </div>
        `;
        grid.appendChild(card);
      });
      content.appendChild(grid);

      content.querySelectorAll('.btnrow').forEach(row => {
        row.addEventListener('click', async (e) => {
          const btn = e.target.closest('button[data-status]');
          if (!btn) return;
          const dept = row.dataset.dept;
          const status = btn.dataset.status;
          row.querySelectorAll('button').forEach(b => b.disabled = true);
          try {
            const r = await fetch('/api/update', {
              method: 'POST',
              headers: authHeaders({ 'Content-Type': 'application/json' }),
              body: JSON.stringify({ department: dept, status }),
            });
            const result = await r.json();
            if (!r.ok) throw new Error(result.error || 'Update failed');
            toast(`${DEPARTMENTS.find(d => d.key === dept).label} set to ${statusLabel(status)}`);
            await loadStatuses();
          } catch (err) {
            toast(err.message, true);
            row.querySelectorAll('button').forEach(b => b.disabled = false);
          }
        });
      });
    }

    loadStatuses();
  </script>
</body>
</html>
